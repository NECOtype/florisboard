name: Build and release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: go-task/setup-task@v1

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Bump version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.meta.version=$v' extension.json > tmp.json
          mv tmp.json extension.json

      - name: Install bloom
        run: |
          curl -L https://github.com/rose-pine/rose-pine-bloom/releases/download/v3.0.1/rose-pine-bloom-linux-amd64 -o bloom
          chmod +x bloom
          sudo mv bloom /usr/local/bin/

      - name: Run build
        run: task build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "rosepine-*.flex"